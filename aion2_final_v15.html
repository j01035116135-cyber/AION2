<!-- 핵심 부분만 교체하면 됨 (기존 HTML 유지하고 이 JS만 교체해도 됨) -->
<script>
/* =======================
   🔥 Supabase 동기화 핵심
======================= */

let cloudUserId = localStorage.getItem("musang_user_id") || null;
let saveTimer = null;

// 기본 상태
const DEFAULT_STATE = {
  selectedCharacterId: null,
  characters: [],
  taskColors: {},
  weeklyTasks: []
};

let state = JSON.parse(JSON.stringify(DEFAULT_STATE));

// 유저 ID 확보
async function getUserId(){
  if (cloudUserId) return cloudUserId;

  if (!window.supabaseClient) return null;

  const { data } = await window.supabaseClient.auth.getUser();
  if (!data?.user) return null;

  cloudUserId = data.user.id;
  localStorage.setItem("musang_user_id", cloudUserId);
  return cloudUserId;
}

// 🔥 불러오기
async function loadState(){
  const userId = await getUserId();
  if (!userId) return DEFAULT_STATE;

  const { data, error } = await window.supabaseClient
    .from("user_homework_data")
    .select("data")
    .eq("user_id", userId)
    .maybeSingle();

  if (error || !data) return DEFAULT_STATE;

  return data.data || DEFAULT_STATE;
}

// 🔥 저장 (가볍게)
function saveState(){
  if (saveTimer) clearTimeout(saveTimer);

  saveTimer = setTimeout(async () => {
    const userId = await getUserId();
    if (!userId) return;

    await window.supabaseClient
      .from("user_homework_data")
      .upsert({
        user_id: userId,
        data: state
      }, { onConflict: "user_id" });
  }, 300);
}

/* =======================
   🔥 초기 실행
======================= */

window.addEventListener("DOMContentLoaded", async () => {
  state = await loadState();

  if (!state.characters || state.characters.length === 0) {
    state = DEFAULT_STATE;
  }

  render();
});

/* =======================
   🔥 기존 함수 연결
======================= */

// 기존 saveState() 호출 위치 그대로 사용 가능
// render(), renderTable(), renderWeekly() 등은 기존 코드 그대로 유지

</script>
