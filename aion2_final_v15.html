<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>아이온2 [무쌍] 레기온  v8</title>
<style>
  :root{
    --bg:#05070d;
    --panel:#0b1020;
    --line:#28365b;
    --text:#eef2ff;
    --muted:#9aa7d6;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:linear-gradient(180deg,#05070d,#09101e 40%,#0a0f1a);
    color:var(--text);
    font-family:Arial,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  }
  .app{zoom:.72;max-width:none;margin:0;padding:12px 14px 14px 38px}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .title{font-size:30px;font-weight:900}
  .sub{color:var(--muted);margin-top:4px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .pill{
    background:#151d34;border:1px solid #32436e;color:#dfe7ff;border-radius:999px;
    padding:8px 12px;font-size:13px;display:inline-flex;gap:6px;align-items:center;
  }
  button,input,select{font-family:inherit}
  button{border:0;border-radius:10px;padding:10px 12px;cursor:pointer;font-weight:800}
  .btn-primary{background:#6c63b5;color:#fff}
  .btn-dark{background:#1a2644;color:#eef2ff}
  .btn-green{background:#3f8a63;color:#fff}
  .btn-red{background:#7b3b49;color:#fff}
  .btn-sm{padding:7px 10px;font-size:13px;border-radius:8px}
  input,select{
    background:#0a1020;color:var(--text);border:1px solid #28365b;border-radius:10px;
    padding:10px 12px;outline:none;
  }
  input::placeholder{color:#6f7bad}
  .layout{display:grid;grid-template-columns:320px 1fr;gap:14px}
  .panel{
    background:rgba(11,16,32,.96);border:1px solid #28365b;border-radius:18px;
    box-shadow:0 10px 28px rgba(0,0,0,.28);
  }
  .side{padding:14px}
  .main{padding:14px}
  .section-title{font-size:16px;font-weight:900;margin-bottom:10px}
  .stack{display:flex;flex-direction:column;gap:10px}
  .divider{height:1px;background:#1e2a49;margin:14px 0}
  .character-list{display:flex;flex-direction:column;gap:8px}
  .char-item{
    background:#0d152b;border:1px solid #28365b;border-radius:12px;padding:10px 12px;
    display:flex;justify-content:space-between;align-items:center;gap:8px;
  }
  .char-item.active{background:#1a2750;border-color:#667de0}
  .char-name{font-weight:900}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .weekly-box{padding:14px;margin-bottom:12px}
  .weekly-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
  .weekly-grid{display:grid;gap:10px}
  .week-item{border:1px solid #28365b;border-radius:14px;padding:10px;background:#0d1427}
  .week-item.zero{
    background:linear-gradient(180deg, rgba(170,50,50,.42), rgba(120,30,30,.30)) !important;
    border-color:#d26a6a !important;
    box-shadow:
      inset 0 0 0 1px rgba(255,170,170,.28),
      0 0 0 1px rgba(210,106,106,.18);
  }
  .week-item.zero .w-title,
  .week-item.zero .w-value{
    color:#fff5f5;
  }
  .week-item.warn{
    background:linear-gradient(180deg, rgba(120,100,36,.22), rgba(120,100,36,.10)) !important;
    border-color:#8b7631 !important;
    box-shadow:inset 0 0 0 1px rgba(255,220,120,.10);
  }
  .w-head{display:flex;justify-content:space-between;gap:6px;align-items:center;margin-bottom:6px}
  .w-title{font-weight:900;font-size:17px}
  .check{width:18px;height:18px;cursor:pointer}
  .w-value{
    font-size:21px;font-weight:900;margin-bottom:8px;cursor:pointer;
    padding:6px 8px;border-radius:10px;background:#0a101d;border:1px solid #2d3b62;text-align:center;
  }
  .w-controls{display:flex;gap:6px}
  .w-controls button{flex:1;background:#182440;color:#fff;border:1px solid #34456f;padding:6px 0}
  .table-center{display:flex;justify-content:center}
  .table-wrap{
    overflow:auto;border:1px solid #28365b;border-radius:18px;background:#0d1427;width:fit-content;max-width:100%;
  }
  table{width:max-content;min-width:2200px;border-collapse:collapse}
  th,td{border:1px solid #314064;padding:8px 6px;text-align:center;vertical-align:middle}
  thead th{color:#ddd8ff;min-width:138px;position:relative}
  thead th:first-child{min-width:170px;position:sticky;left:0;z-index:3;background:#222441}
  tbody td:first-child{position:sticky;left:0;background:#10182c;z-index:2;min-width:170px}
  .th-title{font-size:19px;font-weight:900;margin-bottom:5px;line-height:1.15}
 .th-sub{
  font-size:10px;
  color:#d7def8;
  line-height:1.15;
  margin-bottom:4px;
}
  .head-actions{display:flex;justify-content:center;gap:6px;align-items:center}
  .head-mini{
    background:rgba(0,0,0,.20);color:#fff;border:1px solid rgba(255,255,255,.18);
    padding:5px 8px;border-radius:8px;font-size:12px;font-weight:800;
  }
  .cell-wrap{display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;min-height:112px}
  .char-box{display:flex;flex-direction:column;gap:6px;align-items:center}
.char-input{
  width:128px;
  text-align:center;
  background:#070c18;
  border:1px solid #3b4d7e;
  color:#fff;
  font-size:18px;
  font-weight:900;
  padding:8px 10px;
}

.stat-row{
  display:flex;
  gap:6px;
  justify-content:center;
  width:100%;
}

.stat-input{
  width:78px;
  text-align:center;
  background:#070c18;
  border:1px solid #3b4d7e;
  border-radius:10px;
  padding:7px 6px;
  font-size:18px;
  font-weight:900;
}

.item-level-input{
  color:#7dd3fc;
}

.power-input{
  color:#facc15;
}
  .main-count{
    font-size:21px;font-weight:900;line-height:1;cursor:pointer;
    padding:4px 8px;border-radius:10px;background:#0a101d;border:1px solid #2d3b62;
  }
  .sub-count{
    font-size:17px;font-weight:800;color:#d9e0ff;line-height:1;cursor:pointer;
    padding:4px 8px;border-radius:10px;background:#151a28;border:1px solid #2a3350;
  }
  .mini-row{display:flex;gap:6px;align-items:center;justify-content:center}
  .mini-btn{
    width:27px;height:27px;border-radius:8px;padding:0;background:#16213b;color:#fff;
    border:1px solid #34456f;font-size:15px;font-weight:900;
  }
  .cube-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .cube{
    min-width:72px;padding:8px 10px;border-radius:12px;border:1px solid #3f5388;
    background:#131d35;color:#fff;font-weight:900;cursor:pointer;user-select:none;
  }
  .cube small{display:block;font-size:11px;color:#b8c4eb;margin-top:2px;font-weight:700}
  .note{
    width:120px;background:#070c18;color:#fff;border:1px solid #3b4d7e;border-radius:10px;padding:8px 10px;
  }
  .empty{padding:30px;color:var(--muted);text-align:center}
  .header-actions{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
  .legend{color:var(--muted);font-size:13px}
  .palette-pop{
    position:absolute;top:100%;left:10px;z-index:50;width:280px;background:#08090d;border:1px solid #2b2d38;
    border-radius:14px;padding:14px;box-shadow:0 12px 24px rgba(0,0,0,.45);display:none;text-align:left;
  }
  .palette-pop.show{display:block}
  .palette-sub{font-size:13px;color:#cdd5ff;margin-bottom:8px}
  .swatches{display:flex;gap:10px;flex-wrap:wrap}
  .swatch{
    width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.14);cursor:pointer;
  }
  .swatch.active{outline:2px solid #fff;outline-offset:2px}
  @media (max-width:1200px){
    .layout{grid-template-columns:1fr}
    .weekly-grid{grid-template-columns:repeat(3,1fr)}
.done-label{
  margin-top:4px;
  font-size:13px;
  font-weight:800;
  color:#ffd6d6;
  letter-spacing:0.5px;
  }
.stat-row{
  display:flex;
  gap:6px;
  justify-content:center;
  width:100%;
}

.stat-input{
  width:61px;
  text-align:center;
  background:#070c18;
  border:1px solid #3b4d7e;
  border-radius:10px;
  padding:7px 6px;
  font-size:13px;
  font-weight:900;
}

.item-level-input{
  color:#7dd3fc;
}

.power-input{
  color:#facc15;
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="title">아이온2 [무쌍] 레기온</div>
      <div class="sub">가로형 전용 · 숫자 직접 수정 · 체크박스 완료 · ⚡오드 충전 관리</div>
    </div>
<div class="row">
  <button class="btn-primary" type="button" id="logoutBtn">로그아웃</button>
  <span class="pill" id="nowTime">현재 시간 -</span>
  <span class="pill" id="nextResetGlobal">다음 리셋 -</span>
  <button class="btn-red" type="button" onclick="resetAllData()">전체 초기화</button>
</div>
  </div>

  <div class="layout">
    <div class="panel side">
      <div class="section-title">캐릭터 관리</div>
      <div class="stack">
        <div class="row">
          <input id="characterNameInput" type="text" placeholder="캐릭터 이름" style="flex:1" />
          <button class="btn-primary" type="button" onclick="addCharacter()">추가</button>
        </div>
        <div id="characterList" class="character-list"></div>
        <div class="small muted">캐릭터 이름은 표 안에서 바로 수정할 수 있습니다.</div>
      </div>

      <div class="divider"></div>

      <div class="section-title">기본 숙제 세트</div>
      <div class="stack">
        <button class="btn-green" type="button" onclick="addPresetTasksToSelected()">선택 캐릭터에 기본 숙제 추가</button>
        <div class="small muted">⚡오드, 사명, 원정-정복, 초월, 악몽, 각성전, 🌀회랑 -하, 🌀회랑 -중, 슈고,  ⚔️루드라, ⚔️침식</div>
      </div>

      <div class="divider"></div>

      <div class="section-title">개별 숙제 추가</div>
      <div class="stack">
        <input id="taskNameInput" type="text" placeholder="숙제 이름" />
        <div class="row">
          <input id="challengeMaxInput" type="number" min="0" placeholder="도전" style="width:82px" />
          <input id="rewardMaxInput" type="number" min="0" placeholder="보상" style="width:82px" />
          <input id="chargeMaxInput" type="number" min="0" placeholder="충전" style="width:82px" />
        </div>
        <select id="resetRuleInput">
          <option value="none">리셋 없음</option>
          <option value="daily_05_reset">매일 05시 초기화</option>
          <option value="daily_05_plus2">매일 05시 +2 충전</option>
          <option value="daily_05_plus1">매일 05시 +1 충전</option>
          <option value="weekly_wed_05_reset">매주 수요일 05시 초기화</option>
          <option value="tue_thu_sat_21_reset">화/목/토 21시 초기화</option>
          <option value="od_charge">오드 3시간당 +15</option>
        </select>
        <div class="row">
          <label class="small muted">컬러</label>
          <input id="taskColorInput" type="color" value="#4a4578" />
          <button class="btn-dark" type="button" onclick="addCustomTask()">추가</button>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="panel weekly-box">
        <div class="weekly-head">
          <div>
            <div class="section-title" style="margin-bottom:4px">주간 숙제</div>
            <div class="small muted">숫자 클릭 시 직접 입력 · 체크박스 클릭 시 전부 완료</div>
          </div>
          <div class="legend">좌클릭/버튼: 차감 · 우클릭: 복구</div>
        </div>
        <div id="weeklyGrid" class="weekly-grid"></div>
      </div>

      <div class="panel main" style="padding:14px">
        <div class="header-actions">
          <div>
            <div class="section-title" style="margin-bottom:4px">캐릭터별 숙제</div>
            <div class="small muted">모든 숫자는 클릭해서 직접 수정 가능</div>
          </div>
          <div class="row">
            <span class="pill">사명/회랑 체크박스 완료 · 슈고 추가</span>
          </div>
        </div>
        <div id="tableArea"></div>
      </div>
    </div>
  </div>
</div>

<script>
const userId = localStorage.getItem("musang_user_id");
const STORAGE_KEY = `aion2_homework_tracker_${userId}`;
const PALETTE = ['#6c63b5','#8d5f5f','#9c6d4a','#9a8b4a','#4d7d62','#4a6d9c','#7a5c9b','#9b5c7f','#555a6b'];

const defaultTaskColors = {
  '⚡오드':'#6a5a34',
  '사명':'#6f5334',
  '슈고':'#8b643f',
  '원정-정복':'#865e3d',
  '초월':'#5f518a',
  '악몽':'#7a553d',
  '각성전':'#475f8c',
  '🌀회랑 -하':'#3f6f66',
  '🌀회랑 -중':'#446f66',
  '⚔️루드라':'#6f3f56',
  '⚔️침식':'#6f3f56',
};

const EXTRA_CHARGE_DEFAULTS = {
  '슈고':10,
  '원정-정복':10,
  '초월':10,
  '악몽':10,
  '각성전':10,
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }

function makeWeekly(name,max){
  return {id:uid(), name, current:max, max, resetRule:'weekly_wed_05_reset', lastResetAppliedKey:null};
}
function makeDefaultWeeklyTasks(){
  return [
    makeWeekly('일일던전',14),
    makeWeekly('원정-정복',35),
    makeWeekly('초월',28),
    makeWeekly('아티쟁',3),
    makeWeekly('나흐마',2),
    makeWeekly('카이라',10),
    makeWeekly('아그로',3),
    makeWeekly('⚔️전장 (승리)',3),
    makeWeekly('어비스사냥',2000),
    makeWeekly('시공(🗡️공격)',100),
    makeWeekly('시공(🛡️방어)',100),
    makeWeekly('심연의 재련',1),
    makeWeekly('오드(제작)',20),
    makeWeekly('원정/초월 충전',21),
    makeWeekly('미지의 틈새',21),
    makeWeekly('즉시완료(일던)',21),
    makeWeekly('즉시완료(악몽)',14),
    makeWeekly('특수결정',1000),
    makeWeekly('부활석',7)
  ];
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw){
      return {selectedCharacterId:null, characters:[], taskColors:{...defaultTaskColors}, weeklyTasks:makeDefaultWeeklyTasks()};
    }
    const parsed = JSON.parse(raw);
    if(!parsed.characters) parsed.characters = [];
    parsed.characters.forEach(c => {
  if (!c.tasks) return;
  c.tasks = c.tasks.filter(t => t.name !== '저주');
});
parsed.characters.forEach(c => {
  if(!c.tasks) return;
  c.tasks.forEach(t => {
    if(t.name === '⚔️루드라' || t.name === '⚔️침식'){
      if(typeof t.challengeChargeCurrent !== 'number') t.challengeChargeCurrent = 0;
      if(typeof t.rewardChargeCurrent !== 'number') t.rewardChargeCurrent = 0;

      // 🔥 핵심
      t.challengeChargeMax = 999;
      t.rewardChargeMax = 999;
    }
  });
});
    parsed.taskColors = Object.assign({}, defaultTaskColors, parsed.taskColors || {});
    if(!parsed.weeklyTasks || !parsed.weeklyTasks.length) parsed.weeklyTasks = makeDefaultWeeklyTasks();
    parsed.weeklyTasks.forEach(w => { if (w.name === '전장') w.name = '⚔️전장 (승리)'; });
    const defaultWeekly = makeDefaultWeeklyTasks();
    defaultWeekly.forEach(def => {
      if(!parsed.weeklyTasks.some(w => w.name === def.name)) parsed.weeklyTasks.push(def);
    });
    return parsed;
  }catch(e){
    return {selectedCharacterId:null, characters:[], taskColors:{...defaultTaskColors}, weeklyTasks:makeDefaultWeeklyTasks()};
  }
}
let state = loadState();
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function createTask({name, challengeMax=0, rewardMax=0, chargeMax=0, resetRule='none', color=''}) {
  if(!chargeMax && EXTRA_CHARGE_DEFAULTS[name]) chargeMax = EXTRA_CHARGE_DEFAULTS[name];
  // 루드라/침식은 별도 충전값 0/0 시작
  let challengeChargeMax = 0, challengeChargeCurrent = 0, rewardChargeMax = 0, rewardChargeCurrent = 0;
if(name === '⚔️루드라' || name === '⚔️침식'){
  challengeChargeMax = 999;
  rewardChargeMax = 999;
}
  return {
    id:uid(), name,
    challengeMax, challengeCurrent:challengeMax,
    rewardMax, rewardCurrent:rewardMax,
    chargeMax, chargeCurrent:chargeMax,
    challengeChargeMax, challengeChargeCurrent,
    rewardChargeMax, rewardChargeCurrent,
    resetRule, lastResetAppliedKey:null,
    color:color || state.taskColors[name] || '#4a4578',
    note:''
  };
}
function getSelectedCharacter(){ return state.characters.find(c=>c.id===state.selectedCharacterId) || null; }

function addCharacter(){
  const input = document.getElementById('characterNameInput');
  const name = input.value.trim();
  if(!name){ alert('캐릭터 이름을 입력해주세요.'); return; }
  const c = {
  id: uid(),
  name,
  power: '',
  itemLevel: '',  // 🔥 이 줄 추가
  tasks: []
};
  state.characters.push(c);
  state.selectedCharacterId = c.id;
  input.value = '';
  saveState(); render();
}
function removeCharacter(id){
  const c = state.characters.find(x=>x.id===id);
  if(!c) return;
  if(!confirm("'" + c.name + "' 캐릭터를 삭제할까요?")) return;
  state.characters = state.characters.filter(x=>x.id!==id);
  if(state.selectedCharacterId===id) state.selectedCharacterId = state.characters[0] ? state.characters[0].id : null;
  saveState(); render();
}
function selectCharacter(id){ state.selectedCharacterId = id; saveState(); render(); }
function updateCharacterField(id,key,value){
  const c = state.characters.find(x=>x.id===id);
  if(!c) return;
  c[key] = value;
  saveState();
  renderCharacterList();
}

function addTaskToCharacter(character, data){ character.tasks.push(createTask(data)); }
function addPresetTasksToSelected(){
  const c = getSelectedCharacter();
  if(!c){ alert('먼저 캐릭터를 추가해주세요.'); return; }
  const preset = [
    { name:'⚡오드', rewardMax:840, chargeMax:2000, resetRule:'od_charge' },
    { name:'사명', rewardMax:5, resetRule:'daily_05_reset' },
    { name:'원정-정복', rewardMax:14, resetRule:'daily_05_plus1' },
    { name:'초월', rewardMax:7, resetRule:'daily_05_plus1' },
    { name:'악몽', rewardMax:14, resetRule:'daily_05_plus2' },
    { name:'각성전', rewardMax:3, resetRule:'weekly_wed_05_reset' },
    { name:'🌀회랑 -하', rewardMax:3, resetRule:'tue_thu_sat_21_reset' },
    { name:'🌀회랑 -중', rewardMax:3, resetRule:'tue_thu_sat_21_reset' },
    { name:'슈고', rewardMax:14, resetRule:'daily_05_plus2' },
    { name:'⚔️루드라', challengeMax:4, rewardMax:2, resetRule:'weekly_wed_05_reset' },
    { name:'⚔️침식', challengeMax:4, rewardMax:2, resetRule:'weekly_wed_05_reset' }
  ];
  const exists = new Set(c.tasks.map(t=>t.name));
  preset.forEach(p=>{ if(!exists.has(p.name)) addTaskToCharacter(c,p); });
  saveState(); render();
}
function addCustomTask(){
  const c = getSelectedCharacter();
  if(!c){ alert('먼저 캐릭터를 추가해주세요.'); return; }
  const name = document.getElementById('taskNameInput').value.trim();
  const challengeMax = Number(document.getElementById('challengeMaxInput').value || 0);
  const rewardMax = Number(document.getElementById('rewardMaxInput').value || 0);

function smartSpend(taskId, reverse=false){

  if(!t) return;
  if(!reverse){
    if(t.rewardCurrent > 0) t.rewardCurrent -= 1;

    if(t.rewardCurrent < t.rewardMax) t.rewardCurrent += 1;
    else if(t.chargeCurrent < t.chargeMax) t.chargeCurrent += 1;
  }
  saveState(); renderTable();
}

function getRuleLabel(rule){
  const map = {
    none:'리셋 없음',
    daily_05_reset:'매일 05시 초기화',
    daily_05_plus2:'매일 05시 +2 충전',
    daily_05_plus1:'매일 05시 +1 충전',
    weekly_wed_05_reset:'매주 수요일 05시 초기화',
    tue_thu_sat_21_reset:'화/목/토 21시 초기화',
    od_charge:'3시간당 +15 충전'
  };
  return map[rule] || rule;
}
function getNextResetDate(rule, now = new Date()){
  if(rule === 'none') return null;
  if(rule === 'daily_05_reset' || rule === 'daily_05_plus2' || rule === 'daily_05_plus1'){
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 5, 0, 0, 0);
    return today > now ? today : new Date(now.getFullYear(), now.getMonth(), now.getDate()+1, 5, 0, 0, 0);
  }
  if(rule === 'weekly_wed_05_reset'){
    const currentDay = now.getDay();
    let diff = (3 - currentDay + 7) % 7;
    let candidate = new Date(now.getFullYear(), now.getMonth(), now.getDate()+diff, 5, 0, 0, 0);
    if(candidate <= now) candidate = new Date(now.getFullYear(), now.getMonth(), now.getDate()+diff+7, 5, 0, 0, 0);
    return candidate;
  }
  if(rule === 'tue_thu_sat_21_reset'){
    for(let i=0;i<8;i++){
      const dtBase = new Date(now.getFullYear(), now.getMonth(), now.getDate()+i, 21, 0, 0, 0);
      if([2,4,6].includes(dtBase.getDay()) && dtBase > now) return dtBase;
    }
  }
  if(rule === 'od_charge'){
    for(let i=0;i<10;i++){
      const day = new Date(now.getFullYear(), now.getMonth(), now.getDate()+i, 0,0,0,0);
      for(const h of [2,5,8,11,14,17,20,23]){
        const dt = new Date(day.getFullYear(), day.getMonth(), day.getDate(), h, 0, 0, 0);
        if(dt > now) return dt;
      }
    }
  }
  return null;
}
function getLatestReset(rule, now = new Date()){
  if(rule === 'none') return null;
  if(rule === 'daily_05_reset' || rule === 'daily_05_plus2' || rule === 'daily_05_plus1'){
    const today05 = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 5, 0, 0, 0);
    const dt = now >= today05 ? today05 : new Date(now.getFullYear(), now.getMonth(), now.getDate()-1, 5, 0, 0, 0);
    return {key:dt.toISOString(), date:dt};
  }
  if(rule === 'weekly_wed_05_reset'){
    for(let i=0;i<8;i++){
      const dt = new Date(now.getFullYear(), now.getMonth(), now.getDate()-i, 5, 0, 0, 0);
      if(dt.getDay()===3 && dt<=now) return {key:dt.toISOString(), date:dt};
    }
  }
  if(rule === 'tue_thu_sat_21_reset'){
    for(let i=0;i<8;i++){
      const dt = new Date(now.getFullYear(), now.getMonth(), now.getDate()-i, 21, 0, 0, 0);
      if([2,4,6].includes(dt.getDay()) && dt<=now) return {key:dt.toISOString(), date:dt};
    }
  }
  return null;
}
function getLatestOdCharge(now = new Date()){
  for(let i=0;i<3;i++){
    const day = new Date(now.getFullYear(), now.getMonth(), now.getDate()-i, 0,0,0,0);
    for(const h of [23,20,17,14,11,8,5,2]){
      const dt = new Date(day.getFullYear(), day.getMonth(), day.getDate(), h, 0, 0, 0);
      if(dt <= now) return {key:dt.toISOString(), date:dt};
    }
  }
  return null;
}
function applyRuleToTask(task){
  if(task.resetRule === 'od_charge'){
    const hit = getLatestOdCharge();
    if(!hit || task.lastResetAppliedKey === hit.key) return false;
    task.rewardCurrent = clamp(task.rewardCurrent + 15, 0, task.rewardMax);
    task.lastResetAppliedKey = hit.key;
    return true;
  }
  const hit = getLatestReset(task.resetRule);
  if(!hit || task.lastResetAppliedKey === hit.key) return false;
  if(task.resetRule === 'daily_05_reset' || task.resetRule === 'weekly_wed_05_reset' || task.resetRule === 'tue_thu_sat_21_reset'){
    if(task.challengeMax > 0) task.challengeCurrent = task.challengeMax;
    if(task.rewardMax > 0) task.rewardCurrent = task.rewardMax;
    if(task.chargeMax > 0) task.chargeCurrent = task.chargeMax;
    if(task.challengeChargeMax > 0 || task.challengeChargeCurrent > 0) task.challengeChargeCurrent = task.challengeChargeMax;
    if(task.rewardChargeMax > 0 || task.rewardChargeCurrent > 0) task.rewardChargeCurrent = task.rewardChargeMax;
  }else if(task.resetRule === 'daily_05_plus2'){
    task.rewardCurrent = clamp(task.rewardCurrent + 2, 0, task.rewardMax);
  }else if(task.resetRule === 'daily_05_plus1'){
    task.rewardCurrent = clamp(task.rewardCurrent + 1, 0, task.rewardMax);
  }
  task.lastResetAppliedKey = hit.key;
  return true;
}
function applyRuleToWeekly(task){
  const hit = getLatestReset(task.resetRule);
  if(!hit || task.lastResetAppliedKey === hit.key) return false;
  task.current = task.max;
  task.lastResetAppliedKey = hit.key;
  return true;
}
function applyAllRules(){
  let changed = false;
  state.characters.forEach(c=>c.tasks.forEach(t=>{ if(applyRuleToTask(t)) changed = true; }));
  state.weeklyTasks.forEach(w=>{ if(applyRuleToWeekly(w)) changed = true; });
  if(changed) saveState();
}

function formatDateTime(dt){
  if(!dt) return '-';
  const y = dt.getFullYear();
  const m = String(dt.getMonth()+1).padStart(2,'0');
  const d = String(dt.getDate()).padStart(2,'0');
  const h = String(dt.getHours()).padStart(2,'0');
  const min = String(dt.getMinutes()).padStart(2,'0');
  return `${y}-${m}-${d} ${h}:${min}`;
}
function diffText(dt, now = new Date()){
  if(!dt) return '없음';
  let ms = Math.max(0, dt - now);
  const totalMin = Math.floor(ms / 60000);
  const day = Math.floor(totalMin / 1440);
  const hour = Math.floor((totalMin % 1440) / 60);
  const min = totalMin % 60;
  if(day > 0) return `${day}일 ${hour}시간 후`;
  if(hour > 0) return `${hour}시간 ${min}분 후`;
  return `${min}분 후`;
}
function escapeHtml(str){
  return String(str ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}
function cssId(str){ return String(str).replace(/[^a-zA-Z0-9가-힣]/g,'_'); }
function getMainClass(cur,max){
  if(max === 0) return '';
  if(cur === 0) return 'zero';
  if(cur <= Math.max(1, Math.floor(max*0.2))) return 'warn';
  return '';
}
function getGlobalNearest(){
  const arr = [];
  state.characters.forEach(c=>c.tasks.forEach(t=>{ const dt = getNextResetDate(t.resetRule); if(dt) arr.push(dt); }));
  state.weeklyTasks.forEach(w=>{ const dt = getNextResetDate(w.resetRule); if(dt) arr.push(dt); });
  arr.sort((a,b)=>a-b);
  return arr[0] || null;
}

function orderedTaskNames(){
  const hiddenTasks = ['저주'];

  const preferred = [
    '⚡오드','사명','원정-정복','초월','악몽',
    '각성전','🌀회랑 -하','🌀회랑 -중',
    '슈고','⚔️루드라','⚔️침식'
  ];

  const all = [];
  state.characters.forEach(c => {
    c.tasks.forEach(t => {
      if (!hiddenTasks.includes(t.name) && !all.includes(t.name)) {
        all.push(t.name);
      }
    });
  });

  return preferred
    .filter(n => !hiddenTasks.includes(n) && all.includes(n))
    .concat(all.filter(n => !preferred.includes(n) && !hiddenTasks.includes(n)));
}

          <button class="mini-btn" type="button" onclick="changeTaskCount('${t.id}','${targetKey}',1)" oncontextmenu="changeTaskByContext(event,'${t.id}','${targetKey}',-1)">+</button>
        </div>
        <input class="note" value="${escapeHtml(t.note || '')}" placeholder="메모" oninput="t.note=this.value" />
      </div>
    </td>
    `;
}

function renderTable(){
  const area = document.getElementById('tableArea');
  if(!state.characters.length){
    area.innerHTML = '<div class="empty">캐릭터를 먼저 추가해주세요.</div>';
    return;
  }
  const names = orderedTaskNames();
  area.innerHTML = `
    <div class="table-center">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>
                <div class="th-title">캐릭터</div>
                <div class="th-sub">이름 수정 / 전투력 입력</div>
              </th>
              ${renderHeader(names)}
            </tr>
          </thead>
          <tbody>
            ${state.characters.map(c=>`
              <tr>
                <td>
<div class="char-box">
  <input class="char-input" value="${escapeHtml(c.name || '')}" oninput="c.name=this.value" />
  <div class="stat-row">
    <input class="stat-input item-level-input" value="${escapeHtml(c.itemLevel || '')}" placeholder="아이템레벨" oninput="c.itemLevel=this.value; saveState()" />
    <input class="stat-input power-input" value="${escapeHtml(c.power || '')}" placeholder="전투력" oninput="c.power=this.value; saveState()" />
  </div>
</div>
                  </div>
                </td>
                ${names.map(name=>renderCell(c,name)).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderTop(){
  const now = new Date();
  document.getElementById('nowTime').textContent = '현재 시간 ' + formatDateTime(now);
  const nearest = getGlobalNearest();
  document.getElementById('nextResetGlobal').textContent = '다음 리셋 ' + (nearest ? `${formatDateTime(nearest)} · ${diffText(nearest, now)}` : '없음');
}
function resetAllData(){
  if(!confirm('모든 데이터를 초기화할까요?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  ensureSample();
  render();
}
function ensureSample(){
  if(state.characters.length) return;
  const c = {id:uid(), name:'메인캐릭', power:'', tasks:[]};
  state.characters.push(c);
  state.selectedCharacterId = c.id;
  addTaskToCharacter(c,{ name:'⚡오드', rewardMax:840, chargeMax:2000, resetRule:'od_charge' });
  addTaskToCharacter(c,{ name:'사명', rewardMax:5, resetRule:'daily_05_reset' });
  addTaskToCharacter(c,{ name:'원정-정복', rewardMax:14, resetRule:'daily_05_plus1' });
  addTaskToCharacter(c,{ name:'초월', rewardMax:7, resetRule:'daily_05_plus1' });
  addTaskToCharacter(c,{ name:'슈고', rewardMax:14, resetRule:'daily_05_plus2' });
  saveState();
}


document.addEventListener('click', function(e){
  const inside = e.target.closest('.palette-pop') || e.target.closest('.head-mini');
  if(!inside){
    document.querySelectorAll('.palette-pop').forEach(el=>el.classList.remove('show'));
  }
});

function render(){
  applyAllRules();
  renderCharacterList();
  renderWeekly();
  renderTable();
  renderTop();
}
ensureSample();
render();
setInterval(function(){
  applyAllRules();
  renderWeekly();
  renderTable();
  renderTop();
}, 60000);
</script>

<script type="module">

  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
  const logoutBtn = document.getElementById("logoutBtn");

  async function requireLogin() {
    const { data, error } = await supabase.auth.getSession();

    if (error || !data.session) {
      localStorage.removeItem("musang_user_id");
      localStorage.removeItem("musang_username");
      window.location.href = "index.html";
      return;
    }
  }

  async function logout() {
    const { error } = await supabase.auth.signOut();

    if (error) {
      alert("로그아웃 실패: " + error.message);
      return;
    }

    localStorage.removeItem("musang_user_id");
    localStorage.removeItem("musang_username");
    window.location.href = "index.html";
  }

  if (logoutBtn) {
    logoutBtn.addEventListener("click", logout);
  }

  await requireLogin();
